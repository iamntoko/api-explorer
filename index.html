<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars Explorer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Star Wars Explorer</h1>
    </header>
    <main>
        <section>
            <h2 id="sub-heading">Explore Star Wars Characters and Films</h2>

            <div id="content">
                <div id="character-section" class="card">
                    <h3>Characters</h3>
                    <ul id="character-list">
                    </ul>
                </div>

                <div id="film-section" class="card">
                    <h3>Films</h3>
                    <ul id="film-list">
                        <li class="placeholder">Select a character to view their films.</li>
                    </ul>
                </div>

                <div id="film-characters-section" class="card">
                    <h3>Film Characters</h3>
                    
                    <ul id="film-characters-list">
                        <li class="placeholder">Select a film to view its characters.</li>
                    </ul>
                </div>
            </div>
        </section>
        
    </main> 
</body>
</html>
